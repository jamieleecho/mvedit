name: Bump Version and Start New Release

on:
  workflow_dispatch:

jobs:
  bump:
    if: "!contains(github.event.head_commit.author.name, 'version-bumper')"
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - name: Fail if branch is not main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "This workflow should not be triggered with workflow_dispatch on a branch other than main"
          exit 1

      - uses: actions/checkout@master

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump Versions
        uses: michmich112/version-bumper@master
        env:
          CI: false
        with:
          options-file: './bump-info.json'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync and Tag
        run: |
          export VERSION=`grep "version" package.json | sed 's/.*: *"//' | sed 's/" *//'`
          echo "TAG=${VERSION}" >> $GITHUB_ENV

      - uses: EndBug/add-and-commit@v9
        with:
          message: "Bump version to ${{ env.TAG }}"
          push: true
          tag: ${{ env.TAG }}
          committer_name: GitHub Actions
          committer_email: actions@github.com

      - name: Trigger release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run make-release.yml --ref ${{ env.TAG }}
